server.port=8081

spring.application.name=TenantApi

management.endpoints.web.exposure.include=*
management.endpoint.health.show-details=always

#Tracing 100% of the requests
management.tracing.sampling.probability=1.0

#Zipkin connection config
management.tracing.export.zipkin.endpoint=http://localhost:9411/api/v2/spans

#Adding Optional Baggage field tenantId
management.tracing.baggage.remote-fields=tenantId
management.tracing.baggage.correlation.fields=tenantId
management.tracing.propagation.type=b3